    <style>

            --card-bg: #ffffff; --gold: #b8860b;

        }
        * { box-sizing: border-box; transition: 0.4s; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: #000 var(--bg-img) no-repeat center center fixed; background-size: cover; color: var(--text); overflow-x: hidden; }
        
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .container { background: var(--bg-overlay); border: 3px solid var(--gold); border-radius: 25px; padding: 30px; width: 95%; max-width: 1100px; backdrop-filter: blur(10px); box-shadow: 0 0 25px var(--gold); margin: 20px auto; }
        .page { display: none; min-height: 100vh; padding: 40px 20px 120px; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: transparent; border: 2px solid var(--gold); color: var(--text); padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 700; margin: 10px; font-size: 1.1rem; text-decoration: none; display: inline-block; text-align: center; }
        .btn:hover { background: var(--gold); color: #000; transform: scale(1.05); }
        .btn-exit { border-color: var(--accent); color: var(--accent); }

        /* تنسيق الفيديو الجديد */
        .video-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .video-thumb { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--gold); cursor: pointer; }
        .video-info { padding: 15px; text-align: right; flex-grow: 1; }
        .video-info h4 { margin: 0 0 10px; color: var(--gold); font-size: 1.1rem; }
        .video-info p { margin: 0; color: #ccc; font-size: 0.85rem; line-height: 1.5; }

        /* لعبة السرداب */
        .doors-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .door { width: 100px; height: 150px; background: #5d4037; border: 3px solid var(--gold); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative; }
        .door.open { background: #222; }

        .quiz-timer { font-size: 3rem; color: var(--accent); font-weight: 900; }

        const QUESTIONS = [
            {q: "ما هو البناء الذي ظل الأطول في العالم لمدة 3800 عام؟", o: ["هرم خوفو", "برج إيفل", "منارة الإسكندرية", "سور الصين"], a: 0},

            {q: "كم كان عدد سكان روما في ذروة قوتها؟", o: ["100 ألف", "مليون نسمة", "500 ألف", "10 ملايين"], a: 1},
            {q: "من هو 'أبو التاريخ' الذي زار مصر وكتب عنها؟", o: ["سقراط", "هيرودوت", "هوميروس", "أرسطو"], a: 1},
            {q: "ماذا يعني اسم 'كيميت' الذي أطلقه المصريون على أرضهم؟", o: ["الأرض الذهبية", "الأرض السوداء", "أرض النيل", "أرض الشمس"], a: 1},
            {q: "أي حضارة اشتهرت بالتربية العسكرية القاسية لأطفالها؟", o: ["أثينا", "إسبرطة", "روما", "فارس"], a: 1},
            {q: "ما هو السلاح الذي استخدمه الفرس لترهيب الجيوش؟", o: ["المنجنيق", "الفيلة الحربية", "نار الإغريق", "العجلات"], a: 1},

        // --- وظائف النظام ---
        let currentQ = 0, score = 0, qTimer, shuffledQuestions = [];

        function shuffleArray(arr) { return arr.sort(() => Math.random() - 0.5); }

        function closeIntro() { 
            document.getElementById('intro').style.display = 'none'; 
            document.getElementById('bgMusic').play().catch(() => {});
        }

        function toggleMusic() { const m = document.getElementById('bgMusic'); m.paused ? m.play() : m.pause(); }
        
        function toggleTheme() { 
            const isLight = document.body.classList.toggle('light-mode');
            document.body.style.backgroundImage = isLight ? "url('https://images.unsplash.com/photo-1503152394-c571994fd383')" : "url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986')";
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            if (grid.innerHTML === "") {
                grid.innerHTML = vids.map(v => `
                    <div class="video-card">
                        <img class="video-thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" onclick="openVideo('${v.id}')" alt="${v.t}">
                        <div class="video-info">
                            <h4>${v.t}</h4>
                            <p>${v.d}</p>
                            <button class="btn" style="padding: 5px 15px; font-size: 0.8rem; margin-top:10px;" onclick="openVideo('${v.id}')">تشغيل 🎥</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function openVideo(id) {
            window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
        }

        function startQuiz() {
            currentQ = 0; score = 0;
            shuffledQuestions = shuffleArray([...QUESTIONS]);
            showPage('quiz-page');
            loadQuestion();
        }

        function loadQuestion() {
            if(currentQ >= 30) return endQuiz();
            clearInterval(qTimer);
            let time = 20;
            document.getElementById('timerDisplay').innerText = time;
            document.getElementById('quizProgress').innerText = `سؤال: ${currentQ+1} / 30`;
            document.getElementById('quizScore').innerText = `نقاط: ${score}`;
            const qData = shuffledQuestions[currentQ];
            document.getElementById('questionText').innerText = qData.q;
            let opts = qData.o.map((txt, i) => ({txt, isCorrect: i === qData.a}));
            opts = shuffleArray(opts);
            const box = document.getElementById('optionsBox');
            box.innerHTML = '';
            opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.txt;
                b.onclick = () => { 
                    if(opt.isCorrect) { score++; b.style.background = "var(--success)"; b.style.color="#000"; }
                    else { b.style.background = "var(--accent)"; b.style.color="#fff"; }
                    setTimeout(() => { currentQ++; loadQuestion(); }, 500);
                };
                box.appendChild(b);
            });
            qTimer = setInterval(() => {
                time--; document.getElementById('timerDisplay').innerText = time;
                if(time <= 0) { currentQ++; loadQuestion(); }
            }, 1000);
        }

        function endQuiz() {
            clearInterval(qTimer);
            document.getElementById('quiz-page').innerHTML = `
                <div class="container" style="text-align:center;">
                    <h1>انتهى التحدي!</h1>
                    <h2 style="font-size:4rem; color:var(--gold);">${score} / 30</h2>
                    <button class="btn" onclick="location.reload()">العودة للرئيسية</button>
                </div>`;
        }

        function exitQuiz() { if(confirm("هل تريد العودة؟")) location.reload(); }

        function renderFacts(cat) {
            document.getElementById('factsBox').innerHTML = FACTS_DATA[cat].map((f, i) => `<div class="fact-item">📍 <b>${i+1}:</b> ${f}</div>`).join('');
        }

        function initDungeon() {
            const container = document.getElementById('doorsContainer');
            container.innerHTML = '';
            document.getElementById('dungeonStatus').innerText = 'اختر باباً...';
            let items = shuffleArray(['treasure', 'treasure', 'trap', 'trap', 'empty', 'empty']);
            for(let i=0; i<6; i++) {
                const d = document.createElement('div');
                d.className = 'door';
                d.onclick = function() {
                    if(this.classList.contains('open')) return;
                    this.classList.add('open', items[i]);
                    if(items[i] === 'treasure') document.getElementById('dungeonStatus').innerText = '🎉 كنز مذهل!';
                    if(items[i] === 'trap') document.getElementById('dungeonStatus').innerText = '💥 فخ متفجر!';
                    if(items[i] === 'empty') document.getElementById('dungeonStatus').innerText = '💨 غرفة فارغة.';
                };
                container.appendChild(d);
            }
        }

        function shareApp() {
            const shareText = `🏛️ موسوعة أسرار الحضارات القديمة 2026\n📜 200 معلومة، 30 سؤالاً، 20 فيديو\n👨‍💻 عمل: يوسف مصطفى حمدان`;
            if (navigator.share) {
                navigator.share({ title: 'موسوعة الحضارات', text: shareText, url: window.location.href });
            } else {
                navigator.clipboard.writeText(shareText + "\n" + window.location.href).then(() => alert("✅ تم النسخ!"));
            }
        }

        window.onload = () => {
            let i = 0; const msg = "تقدم لكم ....اسرار اقدم الحضارات  في العالم... هيا لنبدأ رحلتنا!";
            function type() {
                if(i < msg.length) { document.getElementById('typewriter').innerHTML += msg.charAt(i); i++; setTimeout(type, 35); }
                else { document.getElementById('entryBtn').style.display = 'inline-block'; }
            }
            type();
            initDungeon();
        };
    </script>
